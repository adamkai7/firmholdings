name: Daily ARK Holdings Download

on:
  schedule:
    # Runs every day at 8:00 AM UTC
    - cron: '0 8 * * *'
  workflow_dispatch: # Allows manual triggering to test it anytime

jobs:
  download-and-save:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download ARKK CSV File
        run: |
          curl -o arkk_holdings.csv "https://assets.ark-funds.com/fund-documents/funds-etf-csv/ARK_INNOVATION_ETF_ARKK_HOLDINGS.csv"

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add arkk_holdings.csv
          
          # Prevents the workflow from failing if the data hasn't updated since yesterday
          git commit -m "Automated daily download of ARKK holdings" || echo "No changes to commit"
          
          git push
